<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lector escalonado / Stepped Reader</title>

  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --text: #eee;
      --muted: #aaa;
      --accent: #7dd3fc;
      --line: #333;
      --book-width: 980px;
      --font-size: 24px;
      --gap-y: 0.35em;
      --chunk-gap: 1.2em;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(17, 17, 17, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }

    body.reading-mode header {
      display: none;
    }

    .floating-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 50;
      display: none;
      align-items: center;
      gap: 10px;
      border: 1px solid #555;
      border-radius: 999px;
      padding: 8px 10px 8px 14px;
      background: rgba(20, 20, 20, 0.92);
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    body.reading-mode .floating-panel {
      display: flex;
    }

    .floating-stats {
      font-size: 14px;
      color: #ddd;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .floating-stop {
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
    }

    .controls {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, button {
      font: inherit;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 9px 10px;
      background: var(--panel);
      color: var(--text);
    }

    button {
      cursor: pointer;
      background: #222;
      color: var(--accent);
      font-weight: 700;
    }

    button:hover { filter: brightness(1.15); }

    main {
      width: min(var(--book-width), calc(100vw - 24px));
      margin: 28px auto;
      font-size: var(--font-size);
      line-height: 1.35;
    }

    .status {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 18px;
    }

    .book {
      display: grid;
      gap: var(--chunk-gap);
      padding-bottom: 80px;
    }

    .block {
      display: grid;
      grid-template-columns: max-content max-content max-content max-content;
      column-gap: 0;
      row-gap: var(--gap-y);
      align-items: start;
      width: fit-content;
      max-width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 0.25em;
    }

    .part1-prefix {
      grid-column: 1 / 2;
      grid-row: 1;
      white-space: nowrap;
    }

    .part1-prefix.has-anchor {
      padding-right: 1ch;
    }

    .part1-anchor {
      grid-column: 2 / 3;
      grid-row: 1;
      white-space: nowrap;
    }

    .part2-prefix {
      grid-column: 2 / 4;
      grid-row: 2;
      white-space: nowrap;
    }

    .part2-prefix.has-anchor {
      padding-right: 1ch;
    }

    .part2-anchor {
      grid-column: 4 / 5;
      grid-row: 2;
      white-space: nowrap;
    }

    .part3 {
      grid-column: 4 / 5;
      white-space: nowrap;
    }

    .part3.first {
      grid-row: 3;
    }

    .empty {
      padding-left: 0;
    }

    .paragraph-break {
      height: 1.2em;
    }

    .fallback {
      border: 1px dashed #555;
      border-radius: 14px;
      padding: 16px;
      color: var(--muted);
      background: #151515;
    }

    .pause-pill {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 80;
      display: none;
      border: 1px solid #777;
      border-radius: 999px;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    body.reading-mode .pause-pill.show {
      display: block;
    }



    .progress-shell {
      grid-column: 1 / -1;
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      overflow: hidden;
      border: 1px solid #444;
      border-radius: 999px;
      background: #171717;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 180ms linear;
    }

    .progress-text {
      font-variant-numeric: tabular-nums;
    }

    .bookmark-tools {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(150px, 2fr) minmax(140px, 2fr) repeat(3, minmax(90px, auto));
      gap: 10px;
      align-items: end;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 10px;
    }

    .bookmark-tools button {
      min-height: 42px;
    }

    @media (max-width: 680px) {
      :root { --font-size: 20px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .bookmark-tools { grid-template-columns: 1fr 1fr; }
      .bookmark-tools button { width: 100%; }
    }
  </style>
</head>

        rendered: 'Rendered: {blocks} blocks. Format {p1} x {p2} x {p3}. Total: {total} words.',
        progressStatus: 'Progress: {percent}%',
        visibleStatus: 'Visible: {visible} words',
        remaining: '{time} left',
        wordCount: '{current}/{total}',
        ttsStatus: 'TTS {rate}x',
        ttsUnsupported: 'Your browser does not support TTS with speechSynthesis.',
        pause: 'Break',
        pauseCountdown: 'Break: {seconds}s',
        pauseExtra: 'break {seconds}s',
        pauseFloating: 'break',
        pauseEnds: 'Break ends · resumes in 2s',
        pauseEndsExtra: 'break ends, resumes in 2s',
        nextJump: '{wpm} wpm | next jump {seconds}s',
        wordsUnit: 'words'
      }
    };

    function t(key, vars = {}) {
      const dict = I18N[currentLang] || I18N.es;
      let text = dict[key] || I18N.es[key] || key;
      for (const [name, value] of Object.entries(vars)) {
        text = text.replaceAll('{' + name + '}', String(value));
      }
      return text;
    }

    function localeCode() {
      return currentLang === 'en' ? 'en-US' : 'es-AR';
    }

    function nf(value) {
      return Number(value || 0).toLocaleString(localeCode());
    }

    function setLabel(inputId, key) {
      const label = els[inputId]?.closest('label');
      if (!label) return;

      for (const node of label.childNodes) {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
          node.textContent = '\n          ' + t(key) + '\n          ';
          return;
        }
      }
    }

    function setButton(id, key) {
      if (els[id]) els[id].textContent = t(key);
    }

    function setOptionText(select, value, text) {
      const option = select?.querySelector(`option[value="${value}"]`);
      if (option) option.textContent = text;
    }

    function updateBreakOptionsLanguage() {
      setOptionText(els.breakEvery, '0', t('off'));
      for (const option of els.breakEvery.options) {
        const n = Number(option.value);
        if (n > 0) option.textContent = n + ' ' + (n === 1 ? t('minute') : t('minutes'));
      }
    }

    function updateDynamicButtonTexts() {
      els.playBtn.textContent = isPlaying ? t('pauseBtn') : t('play');
      els.playTtsBtn.textContent = isTtsPlaying ? t('stopTts') : t('playTts');
      els.applyFormatBtn.textContent = formatPending ? t('applyFormatPending') : t('applyFormat');
      els.floatingStopBtn.textContent = t('floatingStop');
    }

    function applyLanguage() {
      currentLang = els.uiLang?.value || 'es';
      document.documentElement.lang = currentLang;
      document.title = t('title');

      setLabel('uiLang', 'language');
      setLabel('bookSelect', 'book');
      setLabel('newBookName', 'addBook');
      setLabel('filePath', 'file');
      setLabel('part1Words', 'part1Words');
      setLabel('part2Words', 'part2Words');
      setLabel('part3Lines', 'part3Lines');
      setLabel('part3Words', 'part3Words');
      setLabel('fontSize', 'fontSize');
      setLabel('synesthesiaMode', 'synesthesia');
      setLabel('bookWidth', 'bookWidth');
      setLabel('wpm', 'wpm');
      setLabel('ttsRate', 'ttsRate');
      setLabel('smartScrollMode', 'smartScroll');
      setLabel('breakEvery', 'breakEvery');
      setLabel('breakDuration', 'breakDuration');
      setLabel('bookmarkName', 'bookmarkName');
      setLabel('bookmarkSelect', 'bookmarks');

      els.newBookName.placeholder = t('addBookPlaceholder');
      els.bookmarkName.placeholder = t('bookmarkNamePlaceholder');

      setButton('addBookBtn', 'addBookBtn');
      setButton('loadBtn', 'loadBtn');
      setButton('saveBookmarkBtn', 'saveBookmark');
      setButton('goBookmarkBtn', 'go');
      setButton('deleteBookmarkBtn', 'delete');

      updateDynamicButtonTexts();

      setOptionText(els.smartScrollMode, 'block', t('blockMode'));

        els.status.textContent = t('ready');

      renderBookList();

      updateProgressUi();
      updateFloatingStats();
    }


    function safeJsonParse(value, fallback) {
      try { return value ? JSON.parse(value) : fallback; }
      catch (err) { return fallback; }
    }

    function debounceTimer(timerName, callback, delay = 500) {
      clearTimeout(window[timerName]);
      window[timerName] = setTimeout(callback, delay);
    }

    function applyCssOnly() {
      const cfg = getConfig();
      document.documentElement.style.setProperty('--font-size', cfg.fontSize + 'px');
      document.documentElement.style.setProperty('--book-width', cfg.bookWidth + 'px');
      saveSettings();
      updateVisibleWordStatus(' | ' + t('cssApplied'));

      if (isPlaying && !isOnBreak) scheduleNextAutoScroll();
    }

    function scheduleCssOnlyApply() {
      clearTimeout(cssApplyTimer);
      cssApplyTimer = setTimeout(applyCssOnly, 500);
    }

    function markFormatPending() {
      formatPending = true;
      saveSettings();
      els.applyFormatBtn.textContent = t('applyFormatPending');
      updateVisibleWordStatus(' | ' + t('formatPendingExtra'));
    }

    function applyFormatChanges() {
      if (!originalUnits.length) {
        saveSettings();
        return;
      }

      saveReadingPositionNow();
      renderUnits(originalUnits);
      restoreReadingPosition();

      formatPending = false;
      els.applyFormatBtn.textContent = t('applyFormat');
    }

    function cleanBookName(value) {
      return String(value || '')
        .trim()
        .replace(/^\.\/libros\//i, '')
        .replace(/^libros\//i, '');
    }

    function toBookPath(value) {
      const raw = String(value || '').trim();
      if (!raw) return './libros/hp3.html';
      if (/^(https?:|file:|\/|\.\/|\.\.\/)/i.test(raw)) return raw;
      if (/^libros\//i.test(raw)) return './' + raw;
      return './libros/' + raw;
    }

    function readCustomBookNames() {
      return safeJsonParse(localStorage.getItem(CUSTOM_BOOK_LIST_KEY), []);
    }

    function writeCustomBookNames(names) {
      localStorage.setItem(CUSTOM_BOOK_LIST_KEY, JSON.stringify(names));
    }

    function getAllBookNames() {
      const seen = new Set();
      const names = [];

      for (const name of [...DEFAULT_BOOK_NAMES, ...readCustomBookNames()]) {
        const clean = cleanBookName(name);
        if (!clean) continue;

        const key = clean.toLowerCase();
        if (seen.has(key)) continue;

        seen.add(key);
        names.push(clean);
      }

      return names;
    }

    function renderBookList() {
      const currentPath = toBookPath(els.filePath.value);
      const currentName = cleanBookName(currentPath);
      const names = getAllBookNames();

      els.bookSelect.innerHTML = '';

      let hasCurrent = false;

      for (const name of names) {
        const path = toBookPath(name);
        const opt = document.createElement('option');
        opt.value = path;
        opt.textContent = name;

        if (path.toLowerCase() === currentPath.toLowerCase()) {
          opt.selected = true;
          hasCurrent = true;
        }

        els.bookSelect.appendChild(opt);
      }

      if (!hasCurrent && currentName) {
        const opt = document.createElement('option');
        opt.value = currentPath;
        opt.textContent = currentName + ' (' + t('currentSuffix') + ')';
        opt.selected = true;
        els.bookSelect.appendChild(opt);
      }
    }

    function addBookFromInput() {
      const name = cleanBookName(els.newBookName.value);
      if (!name) return;

      const custom = readCustomBookNames();
      const exists = [...DEFAULT_BOOK_NAMES, ...custom]
        .some(item => cleanBookName(item).toLowerCase() === name.toLowerCase());

      if (!exists) {
        custom.push(name);
        writeCustomBookNames(custom);
      }

      els.newBookName.value = '';
      els.filePath.value = toBookPath(name);
      renderBookList();
      saveSettings();
      loadBook();
    }

    function getBookKey() {
      return (els.filePath.value.trim() || './libros/hp3.html').toLowerCase();
    }

    function readSettings() {
      return safeJsonParse(localStorage.getItem(SETTINGS_KEY), {});
    }

    function writeSettings(settings) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function readBooksState() {
      return safeJsonParse(localStorage.getItem(BOOKS_KEY), {});
    }

    function writeBooksState(state) {
      localStorage.setItem(BOOKS_KEY, JSON.stringify(state));
    }

    function getCurrentBookState() {
      const all = readBooksState();
      return all[getBookKey()] || { scrollY: 0, currentWord: 1, bookmarks: [] };
    }

    function saveCurrentBookState(partial) {
      const key = getBookKey();
      const all = readBooksState();
      const prev = all[key] || { scrollY: 0, currentWord: 1, bookmarks: [] };
      all[key] = { ...prev, ...partial, updatedAt: new Date().toISOString() };
      writeBooksState(all);
    }

    function saveSettings() {
      writeSettings({
        uiLang: els.uiLang.value,
        filePath: els.filePath.value,
        part1Words: els.part1Words.value,
        part2Words: els.part2Words.value,
        part3Lines: els.part3Lines.value,
        part3Words: els.part3Words.value,
        fontSize: els.fontSize.value,
        synesthesiaMode: els.synesthesiaMode.value,
        bookWidth: els.bookWidth.value,
        wpm: els.wpm.value,
        ttsRate: els.ttsRate.value,
        smartScrollMode: els.smartScrollMode.value,
        breakEvery: els.breakEvery.value,
        breakDuration: els.breakDuration.value
      });
    }

    function loadSettings() {
      const settings = readSettings();

      for (const [key, value] of Object.entries(settings)) {
        if (els[key] && value !== undefined && value !== null) {
          els[key].value = value;
        }
      }

      els.filePath.value = toBookPath(els.filePath.value);
      renderBookList();
    }

    function getProgressData() {
      if (!totalWordCount) {
        return { currentWord: 0, percent: 0, remainingWords: 0 };
      }

      const currentWord = Math.min(Math.max(1, getCurrentWordPosition()), totalWordCount);
      const readWords = Math.max(0, currentWord - 1);
      const percent = Math.min(100, Math.max(0, (readWords / totalWordCount) * 100));
      const remainingWords = Math.max(0, totalWordCount - currentWord + 1);

      return { currentWord, percent, remainingWords };
    }

    function updateProgressUi() {
      const { currentWord, percent } = getProgressData();
      const percentText = percent.toFixed(2) + '%';

      els.progressBar.style.width = percentText;
      els.progressText.textContent =
        t('progress', { percent: percentText, current: nf(currentWord), total: nf(totalWordCount) });
    }

    function saveReadingPositionNow() {
      if (!originalUnits.length || !totalWordCount) return;

      const { currentWord, percent } = getProgressData();

      saveCurrentBookState({
        scrollY: window.scrollY,
        currentWord,
        percent: Number(percent.toFixed(3))
      });
    }

    function scheduleSaveReadingPosition() {
      clearTimeout(saveScrollTimer);
      saveScrollTimer = setTimeout(saveReadingPositionNow, 250);
    }

    function scrollToWord(word, behavior = 'auto') {
      const blocks = Array.from(document.querySelectorAll('.block'));
      if (!blocks.length) return false;

      const targetWord = Math.max(1, Number(word) || 1);
      let target = blocks.find(block => {
        const start = Number(block.dataset.startWord || 1);
        const end = Number(block.dataset.endWord || start);
        return start <= targetWord && end >= targetWord;
      });

      target = target || blocks.find(block => Number(block.dataset.startWord || 1) >= targetWord) || blocks[blocks.length - 1];

      const headerHeight = document.body.classList.contains('reading-mode')
        ? 0
        : document.querySelector('header').offsetHeight;

      const y = target.getBoundingClientRect().top + window.scrollY - headerHeight - 18;
      window.scrollTo({ top: Math.max(0, y), behavior });
      return true;
    }

    function restoreReadingPosition() {
      const state = getCurrentBookState();
      const word = Number(state.currentWord || 1);
      const y = Number(state.scrollY || 0);

      requestAnimationFrame(() => {
        const restoredByWord = word > 1 && scrollToWord(word, 'auto');
        if (!restoredByWord && y > 0) window.scrollTo({ top: y, behavior: 'auto' });
        updateVisibleWordStatus('');
      });
    }

    function renderBookmarks() {
      const state = getCurrentBookState();
      const bookmarks = Array.isArray(state.bookmarks) ? state.bookmarks : [];

      els.bookmarkSelect.innerHTML = '';

      if (!bookmarks.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = t('noBookmarks');
        els.bookmarkSelect.appendChild(opt);
        return;
      }

      for (const mark of bookmarks) {
        const opt = document.createElement('option');
        opt.value = mark.id;
        const pct = Number(mark.percent || 0).toFixed(2);
        opt.textContent = t('bookmarkOption', { name: mark.name, percent: pct, word: nf(mark.word || 1) });
        els.bookmarkSelect.appendChild(opt);
      }
    }

    function saveBookmark() {
      if (!originalUnits.length || !totalWordCount) return;

      const state = getCurrentBookState();
      const bookmarks = Array.isArray(state.bookmarks) ? state.bookmarks : [];
      const { currentWord, percent } = getProgressData();
      const fallbackName = t('defaultBookmark', { n: bookmarks.length + 1 });
      const name = (els.bookmarkName.value.trim() || fallbackName).slice(0, 80);

      const mark = {
        id: String(Date.now()),
        name,
        word: currentWord,
        percent: Number(percent.toFixed(3)),
        scrollY: window.scrollY,
        createdAt: new Date().toISOString()
      };

      bookmarks.push(mark);
      saveCurrentBookState({ bookmarks, scrollY: window.scrollY, currentWord, percent: mark.percent });
      els.bookmarkName.value = '';
      renderBookmarks();
      els.bookmarkSelect.value = mark.id;
      updateVisibleWordStatus(' | ' + t('bookmarkSaved', { name }));
    }

    function goToSelectedBookmark() {
      const id = els.bookmarkSelect.value;
      if (!id) return;

      const state = getCurrentBookState();
      const mark = (state.bookmarks || []).find(b => b.id === id);
      if (!mark) return;

      stopAutoScroll();
      if (!scrollToWord(mark.word, 'smooth')) {
        window.scrollTo({ top: Number(mark.scrollY || 0), behavior: 'smooth' });
      }
    }

    function deleteSelectedBookmark() {
      const id = els.bookmarkSelect.value;
      if (!id) return;

      const state = getCurrentBookState();
      const bookmarks = (state.bookmarks || []).filter(b => b.id !== id);
      saveCurrentBookState({ bookmarks });
      renderBookmarks();
      updateVisibleWordStatus(' | ' + t('bookmarkDeleted'));
    }

    function normalizeText(text) {
      return text
        .replace(/\u00a0/g, ' ')
        .replace(/[ \t]+/g, ' ')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function htmlToText(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');

      doc.querySelectorAll('script, style, noscript, svg, canvas').forEach(n => n.remove());

      doc.querySelectorAll('p, div, br, h1, h2, h3, h4, h5, h6, li').forEach(n => {
        n.insertAdjacentText('beforeend', '\n');
      });

      return normalizeText(doc.body ? doc.body.innerText : doc.documentElement.innerText);
    }

    function splitIntoUnits(text) {
      const parts = text.split(/(\n\s*\n|\n)/g);
      const units = [];

      for (const part of parts) {
        if (!part) continue;

        if (/^\n\s*\n$/.test(part)) {
          units.push({ type: 'break' });
        } else if (/^\n$/.test(part)) {
          units.push({ type: 'softBreak' });
        } else {
          const words = part.trim().split(/\s+/).filter(Boolean);
          for (const word of words) units.push({ type: 'word', value: word });
        }
      }

      return units;
    }

    function makeWordSpan(word) {
      const span = document.createElement('span');

      if (els.synesthesiaMode.value !== 'on') {
        span.textContent = word;
        return span;
      }

      span.className = 'syn-word';

      for (const char of word) {
        const charSpan = document.createElement('span');
        charSpan.textContent = char;
        if (abc1[char]) charSpan.style.color = abc1[char];
        span.appendChild(charSpan);
      }

      return span;
    }

    function appendWords(container, words) {
      words.forEach((word, i) => {
        if (i > 0) container.append(' ');
        container.appendChild(makeWordSpan(word));
      });
    }

    function getConfig() {
      return {
        part1Words: Math.max(1, Number(els.part1Words.value) || 2),
        part2Words: Math.max(0, Number(els.part2Words.value) || 0),
        part3Lines: Math.max(0, Number(els.part3Lines.value) || 0),
        part3Words: Math.max(1, Number(els.part3Words.value) || 1),
        fontSize: Math.max(12, Number(els.fontSize.value) || 24),
        bookWidth: Math.max(320, Number(els.bookWidth.value) || 980)
      };
    }

    function takeWords(units, state, amount) {
      const words = [];

      while (state.i < units.length && words.length < amount) {
        const unit = units[state.i];

        if (unit.type === 'break') break;

        if (unit.type === 'word') words.push(unit.value);

        state.i++;
      }

      return words;
    }

    function getWordCountInElement(el) {
      const text = el.innerText || el.textContent || '';
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function getVisibleBlocks() {
      const header = document.querySelector('header');
      const headerHeight = document.body.classList.contains('reading-mode') ? 0 : header.offsetHeight;
      const topLimit = headerHeight;
      const bottomLimit = window.innerHeight;

      return Array.from(document.querySelectorAll('.block')).filter(block => {
        const rect = block.getBoundingClientRect();
        return rect.bottom > topLimit && rect.top < bottomLimit;
      });
    }

    function countVisibleWords() {
      const visibleBlocks = getVisibleBlocks();
      return visibleBlocks.reduce((sum, block) => sum + getWordCountInElement(block), 0);
    }

    function getCurrentWordPosition() {
      const blocks = Array.from(document.querySelectorAll('.block'));
      if (!blocks.length) return 0;

      const headerHeight = document.body.classList.contains('reading-mode')
        ? 0
        : document.querySelector('header').offsetHeight;

      const topLimit = headerHeight + 8;

      const firstReadable = blocks.find(block => {
        const rect = block.getBoundingClientRect();
        return rect.bottom > topLimit;
      });

      if (!firstReadable) return totalWordCount;

      return Number(firstReadable.dataset.startWord || 1);
    }

    function formatTimeLeft(minutesFloat) {
      if (!Number.isFinite(minutesFloat) || minutesFloat < 0) return '--';

      const totalSeconds = Math.round(minutesFloat * 60);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) return `${hours}h ${String(minutes).padStart(2, '0')}m`;
      if (minutes > 0) return `${minutes}m ${String(seconds).padStart(2, '0')}s`;
      return `${seconds}s`;
    }

    function updateFloatingStats() {
      const { currentWord, percent, remainingWords } = getProgressData();
      const wpm = Math.max(1, Number(els.wpm.value) || 350);
      const timeLeft = formatTimeLeft(remainingWords / wpm);

      let extra = '';

      if (isOnBreak) {
        extra = ' · ' + t('pauseFloating');
      }

      els.floatingStats.textContent =
        `${percent.toFixed(1)}% · ${nf(currentWord)}/${nf(totalWordCount)} · ${t('remaining', { time: timeLeft })}${extra}`;

      updateProgressUi();
    }

    function updateVisibleWordStatus(extra = '') {
      const visibleWords = countVisibleWords();
      const { currentWord, percent, remainingWords } = getProgressData();
      const wpm = Math.max(1, Number(els.wpm.value) || 350);
      const timeLeft = formatTimeLeft(remainingWords / wpm);
      const base = els.status.textContent.split(' | ')[0];

      els.status.textContent =
        `${base} | ${t('progressStatus', { percent: percent.toFixed(2) })} | ${t('visibleStatus', { visible: visibleWords })} | ${t('wordCount', { current: nf(currentWord), total: nf(totalWordCount) })} | ${t('remaining', { time: timeLeft })}${extra}`;

      updateFloatingStats();

      return visibleWords;
    }

    function getBlocks() {
      return Array.from(document.querySelectorAll('.block, .paragraph-break'));
    }

    function nearestBlockToY(targetY, direction = 1) {
      const blocks = getBlocks();
      if (!blocks.length) return null;

      let best = null;
      let bestDistance = Infinity;

      for (const block of blocks) {
        const y = block.getBoundingClientRect().top + window.scrollY;
        const distance = Math.abs(y - targetY);

        const isForwardOk = direction > 0 ? y >= targetY - 80 : y <= targetY + 80;

        if (isForwardOk && distance < bestDistance) {
          best = block;
          bestDistance = distance;
        }
      }

      return best || blocks[direction > 0 ? blocks.length - 1 : 0];
    }

    function getFirstNewBlockAfterVisible() {
      const blocks = Array.from(document.querySelectorAll('.block'));
      if (!blocks.length) return null;

      const headerHeight = document.body.classList.contains('reading-mode')
        ? 0
        : document.querySelector('header').offsetHeight;

      const topLimit = headerHeight + 8;
      const bottomLimit = window.innerHeight;

      const cutBottomBlock = blocks.find(block => {
        const rect = block.getBoundingClientRect();
        const startsInsideScreen = rect.top >= topLimit && rect.top < bottomLimit;
        const endsBelowScreen = rect.bottom > bottomLimit + 4;
        return startsInsideScreen && endsBelowScreen;
      });

      if (cutBottomBlock) return cutBottomBlock;

      return blocks.find(block => {
        const rect = block.getBoundingClientRect();
        return rect.top >= bottomLimit - 4;
      }) || blocks[blocks.length - 1];
    }

    function getPreviousBlockBeforeVisible() {
      const blocks = Array.from(document.querySelectorAll('.block'));
      if (!blocks.length) return null;

      const headerHeight = document.body.classList.contains('reading-mode')
        ? 0
        : document.querySelector('header').offsetHeight;

      const topLimit = headerHeight + 8;
      let previous = blocks[0];

      for (const block of blocks) {
        const rect = block.getBoundingClientRect();

        if (rect.top < topLimit) previous = block;
        else break;
      }

      const idx = Math.max(0, blocks.indexOf(previous) - 1);
      return blocks[idx];
    }

    function smartScroll(direction) {
      const mode = els.smartScrollMode.value;

      const headerHeight = document.body.classList.contains('reading-mode')
        ? 0
        : document.querySelector('header').offsetHeight;

      const margin = 18;
      const currentY = window.scrollY;

      if (mode === 'block') {
        const targetY = currentY + direction * 120;
        const block = nearestBlockToY(targetY, direction);

        if (block) {
          const y = block.getBoundingClientRect().top + window.scrollY - headerHeight - margin;
          window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
        }

        return;
      }

      const block = direction > 0 ? getFirstNewBlockAfterVisible() : getPreviousBlockBeforeVisible();

      if (block) {
        const y = block.getBoundingClientRect().top + window.scrollY - headerHeight - margin;
        window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      }
    }

    function beep(freq = 880, duration = 180) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + duration / 1000 + 0.03);
      } catch (err) {
        console.log('No pude reproducir alarma:', err);
      }
    }

    function clearBreakTimers() {
      clearTimeout(breakTimer);
      clearTimeout(breakResumeTimer);
      clearInterval(breakCountdownTimer);

      breakTimer = null;
      breakResumeTimer = null;
      breakCountdownTimer = null;
    }

    function hidePausePill() {
      els.pausePill.classList.remove('show');
      els.pausePill.textContent = t('pause');
    }

    function showPausePill(text) {
      els.pausePill.textContent = text;
      els.pausePill.classList.add('show');
    }

    function scheduleBreakTimer() {
      clearTimeout(breakTimer);

      const everyMinutes = Number(els.breakEvery.value) || 0;

      if (!isPlaying || everyMinutes <= 0) return;

      breakTimer = setTimeout(() => {
        startScheduledBreak();
      }, everyMinutes * 60 * 1000);
    }

    function startScheduledBreak() {
      if (!isPlaying || isOnBreak) return;

      isOnBreak = true;

      clearTimeout(autoScrollTimer);
      autoScrollTimer = null;

      clearTimeout(breakTimer);
      breakTimer = null;

      const pauseSeconds = Math.max(1, Number(els.breakDuration.value) || 10);
      let remaining = pauseSeconds;

      beep(520, 220);
      showPausePill(t('pauseCountdown', { seconds: remaining }));
      updateVisibleWordStatus(' | ' + t('pauseExtra', { seconds: remaining }));

      clearInterval(breakCountdownTimer);

      breakCountdownTimer = setInterval(() => {
        if (!isPlaying || !isOnBreak) {
          clearInterval(breakCountdownTimer);
          return;
        }

        remaining--;

        if (remaining > 0) {
          showPausePill(t('pauseCountdown', { seconds: remaining }));
          updateVisibleWordStatus(' | ' + t('pauseExtra', { seconds: remaining }));
        }
      }, 1000);

      breakResumeTimer = setTimeout(() => {
        if (!isPlaying) return;

        clearInterval(breakCountdownTimer);
        breakCountdownTimer = null;

        beep(980, 220);
        showPausePill(t('pauseEnds'));
        updateVisibleWordStatus(' | ' + t('pauseEndsExtra'));

        setTimeout(() => {
          if (!isPlaying) return;

          isOnBreak = false;
          hidePausePill();

          scheduleNextAutoScroll();
          scheduleBreakTimer();
        }, 2000);

      }, pauseSeconds * 1000);
    }

    function loadSpanishVoice() {
      if (!('speechSynthesis' in window)) return;

      const voices = speechSynthesis.getVoices();

      spanishVoice =
        voices.find(v => /^es-AR/i.test(v.lang)) ||
        voices.find(v => /^es-ES/i.test(v.lang)) ||
        voices.find(v => /^es/i.test(v.lang)) ||
        null;
    }

    if ('speechSynthesis' in window) {
      loadSpanishVoice();
      speechSynthesis.onvoiceschanged = loadSpanishVoice;
    }

    function getVisibleTextForTts() {
      const blocks = getVisibleBlocks();

      return blocks
        .map(block => block.innerText || block.textContent || '')
        .join(' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isAtBottom() {
      return window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 12;
    }

    function stopTts() {
      isTtsPlaying = false;
      currentTtsUtterance = null;

      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
      }

      els.playTtsBtn.textContent = t('playTts');

      if (!isPlaying) {
        document.body.classList.remove('reading-mode');
      }

      updateVisibleWordStatus('');
    }

    function speakCurrentVisiblePage() {
      if (!isTtsPlaying) return;

      if (!('speechSynthesis' in window)) {
        alert(t('ttsUnsupported'));
        stopTts();
        return;
      }

      const text = getVisibleTextForTts();

      if (!text) {
        stopTts();
        return;
      }

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      currentTtsUtterance = utterance;

      utterance.lang = 'es-AR';
      utterance.rate = Math.max(0.5, Math.min(2, Number(els.ttsRate.value) || 1));
      utterance.pitch = 1;
      utterance.volume = 1;

      if (spanishVoice) utterance.voice = spanishVoice;

      utterance.onstart = () => {
        updateVisibleWordStatus(' | ' + t('ttsStatus', { rate: utterance.rate }));
      };

      utterance.onerror = () => {
        stopTts();
      };

      utterance.onend = () => {
        if (!isTtsPlaying) return;

        saveReadingPositionNow();

        if (isAtBottom()) {
          stopTts();
          return;
        }

        smartScroll(1);

        waitForScrollSettle(() => {
          if (!isTtsPlaying) return;

          setTimeout(() => {
            if (!isTtsPlaying) return;
            speakCurrentVisiblePage();
          }, 250);
        });
      };

      speechSynthesis.speak(utterance);
    }

    function toggleTts() {
      if (isTtsPlaying) {
        stopTts();
        return;
      }

      stopAutoScroll();

      isTtsPlaying = true;
      document.body.classList.add('reading-mode');
      els.playTtsBtn.textContent = t('stopTts');

      speakCurrentVisiblePage();
    }

    function stopAutoScroll() {
      if (isTtsPlaying) {
        isTtsPlaying = false;
        if ('speechSynthesis' in window) speechSynthesis.cancel();
        els.playTtsBtn.textContent = t('playTts');
      }

      isPlaying = false;
      isOnBreak = false;

      clearTimeout(autoScrollTimer);
      autoScrollTimer = null;

      clearBreakTimers();
      hidePausePill();

      document.body.classList.remove('reading-mode');
      els.playBtn.textContent = t('play');
      renderBookmarks();
      updateVisibleWordStatus('');
    }

    function waitForScrollSettle(callback) {
      let lastY = window.scrollY;
      let stableFrames = 0;

      function tick() {
        const currentY = window.scrollY;

        if (Math.abs(currentY - lastY) < 1) stableFrames++;
        else stableFrames = 0;

        lastY = currentY;

        if (stableFrames >= 5) callback();
        else requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    function scheduleNextAutoScroll() {
      if (!isPlaying || isOnBreak) return;

      const wpm = Math.max(1, Number(els.wpm.value) || 200);
      const visibleWords = Math.max(1, countVisibleWords());
      const delayMs = Math.max(450, (visibleWords / wpm) * 60000);

      updateVisibleWordStatus(' | ' + t('nextJump', { wpm, seconds: (delayMs / 1000).toFixed(1) }));

      clearTimeout(autoScrollTimer);

      autoScrollTimer = setTimeout(() => {
        if (!isPlaying || isOnBreak) return;

        smartScroll(1);

        waitForScrollSettle(() => {
          if (!isPlaying || isOnBreak) return;
          scheduleNextAutoScroll();
        });
      }, delayMs);
    }

    function toggleAutoScroll() {
      if (isPlaying) {
        stopAutoScroll();
        return;
      }

      isPlaying = true;
      isOnBreak = false;

      document.body.classList.add('reading-mode');
      els.playBtn.textContent = t('pauseBtn');

      scheduleNextAutoScroll();
      scheduleBreakTimer();
    }

    function renderUnits(units) {
      const cfg = getConfig();

      document.documentElement.style.setProperty('--font-size', cfg.fontSize + 'px');
      document.documentElement.style.setProperty('--book-width', cfg.bookWidth + 'px');

      els.book.innerHTML = '';

      const state = { i: 0 };
      let blockCount = 0;
      let renderedWordIndex = 0;

      totalWordCount = units.filter(u => u.type === 'word').length;

      const fragment = document.createDocumentFragment();

      while (state.i < units.length) {
        const unit = units[state.i];

        if (unit.type === 'break') {
          const br = document.createElement('div');
          br.className = 'paragraph-break';
          fragment.appendChild(br);
          state.i++;
          continue;
        }

        if (unit.type !== 'word') {
          state.i++;
          continue;
        }

        const part1 = takeWords(units, state, cfg.part1Words);
        const part2 = takeWords(units, state, cfg.part2Words);

        const part3Lines = [];

        for (let line = 0; line < cfg.part3Lines; line++) {
          const words = takeWords(units, state, cfg.part3Words);

          if (words.length) part3Lines.push(words);

          if (state.i < units.length && units[state.i].type === 'break') break;
        }

        const block = document.createElement('div');
        block.className = 'block';

        const wordsInThisBlock =
          part1.length +
          part2.length +
          part3Lines.reduce((sum, line) => sum + line.length, 0);

        block.dataset.startWord = String(renderedWordIndex + 1);
        block.dataset.endWord = String(renderedWordIndex + wordsInThisBlock);

        renderedWordIndex += wordsInThisBlock;

        const part1Prefix = part1.slice(0, -1);
        const part1Anchor = part1.slice(-1);

        const part2Prefix = part2.slice(0, -1);
        const part2Anchor = part2.slice(-1);

        const p1Prefix = document.createElement('div');
        p1Prefix.className = part1Anchor.length ? 'part1-prefix has-anchor' : 'part1-prefix';
        appendWords(p1Prefix, part1Prefix);
        block.appendChild(p1Prefix);

        const p1Anchor = document.createElement('div');
        p1Anchor.className = part1Prefix.length ? 'part1-anchor' : 'part1-anchor empty';
        appendWords(p1Anchor, part1Anchor);
        block.appendChild(p1Anchor);

        const p2Prefix = document.createElement('div');
        p2Prefix.className = part2Anchor.length ? 'part2-prefix has-anchor' : 'part2-prefix';
        appendWords(p2Prefix, part2Prefix);
        block.appendChild(p2Prefix);

        const p2Anchor = document.createElement('div');
        p2Anchor.className = part2Prefix.length ? 'part2-anchor' : 'part2-anchor empty';
        appendWords(p2Anchor, part2Anchor);
        block.appendChild(p2Anchor);

        if (part3Lines.length === 0) {
          const p3 = document.createElement('div');
          p3.className = 'part3 first empty';
          block.appendChild(p3);
        } else {
          part3Lines.forEach((lineWords, index) => {
            const p3 = document.createElement('div');
            p3.className = index === 0 ? 'part3 first' : 'part3';
            p3.style.gridRow = String(3 + index);
            appendWords(p3, lineWords);
            block.appendChild(p3);
          });
        }

        fragment.appendChild(block);
        blockCount++;
      }

      els.book.appendChild(fragment);

      els.status.textContent =
        t('rendered', { blocks: nf(blockCount), p1: cfg.part1Words, p2: cfg.part2Words, p3: cfg.part3Lines, total: nf(totalWordCount) });

      renderBookmarks();
      updateVisibleWordStatus('');

      formatPending = false;
      if (els.applyFormatBtn) els.applyFormatBtn.textContent = t('applyFormat');
    }

    async function loadBook() {
      stopAutoScroll();

      const path = toBookPath(els.filePath.value);
      els.filePath.value = path;
      renderBookList();
      saveSettings();

      els.status.textContent = t('loading', { path });
      els.book.innerHTML = '';

      try {
        const res = await fetch(path, { cache: 'no-store' });

        if (!res.ok) throw new Error('HTTP ' + res.status);

        const html = await res.text();
        const text = htmlToText(html);

        originalUnits = splitIntoUnits(text);

        if (!originalUnits.some(u => u.type === 'word')) {
          throw new Error(t('noReadableText'));
        }

        renderUnits(originalUnits);
        restoreReadingPosition();
      } catch (err) {
        els.status.textContent = t('loadError');

        els.book.innerHTML = `
          <div class="fallback">
            <p><b>${t('fallbackTitle')}</b></p>
            <p>${String(err.message || err)}</p>
            <p>${t('fallbackHelp1')} <code>file://</code>, ${t('fallbackHelp2')} <code>fetch()</code>. ${t('fallbackHelp3')}</p>
            <pre>python3 -m http.server 8000</pre>
            <p>${t('fallbackHelp4')} <code>http://localhost:8000/</code></p>
          </div>
        `;
      }
    }

    els.uiLang.addEventListener('change', () => {
      applyLanguage();
      saveSettings();
      if (originalUnits.length) updateVisibleWordStatus('');
    });

    els.loadBtn.addEventListener('click', loadBook);
    els.applyFormatBtn.addEventListener('click', applyFormatChanges);
    els.bookSelect.addEventListener('change', () => {
      els.filePath.value = els.bookSelect.value;
      saveSettings();
      loadBook();
    });
    els.addBookBtn.addEventListener('click', addBookFromInput);
    els.newBookName.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        addBookFromInput();
      }
    });
    els.playBtn.addEventListener('click', toggleAutoScroll);
    els.playTtsBtn.addEventListener('click', toggleTts);
    els.floatingStopBtn.addEventListener('click', stopAutoScroll);
    els.saveBookmarkBtn.addEventListener('click', saveBookmark);
    els.goBookmarkBtn.addEventListener('click', goToSelectedBookmark);
    els.deleteBookmarkBtn.addEventListener('click', deleteSelectedBookmark);

    els.wpm.addEventListener('change', () => {
      saveSettings();
      if (isPlaying && !isOnBreak) scheduleNextAutoScroll();
      else updateVisibleWordStatus('');
    });

    els.ttsRate.addEventListener('change', () => {
      saveSettings();

      if (isTtsPlaying) {
        speechSynthesis.cancel();
        speakCurrentVisiblePage();
      }
    });

    els.breakEvery.addEventListener('change', () => {
      saveSettings();
      if (isPlaying) scheduleBreakTimer();
    });

    els.breakDuration.addEventListener('change', () => {
      saveSettings();
      if (!isPlaying) updateVisibleWordStatus('');
    });

    window.addEventListener('resize', () => {
      if (isPlaying && !isOnBreak) scheduleNextAutoScroll();
      else updateVisibleWordStatus('');
    });

    window.addEventListener('scroll', () => {
      updateFloatingStats();
      scheduleSaveReadingPosition();

      if (!isPlaying) updateVisibleWordStatus('');
    }, { passive: true });

    window.addEventListener('beforeunload', () => {
      saveSettings();
      saveReadingPositionNow();
    });

    window.addEventListener('keydown', (ev) => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      const isTyping = tag === 'input' || tag === 'textarea' || tag === 'select';

      if (isTyping) return;

      if (ev.key === 'ArrowRight') {
        ev.preventDefault();
        stopAutoScroll();
        smartScroll(1);
      }

      if (ev.key === 'ArrowLeft') {
        ev.preventDefault();
        stopAutoScroll();
        smartScroll(-1);
      }

      if (ev.key === ' ') {
        ev.preventDefault();
        toggleAutoScroll();
      }
    });

    for (const input of [
      els.part1Words,
      els.part2Words,
      els.part3Lines,
      els.part3Words,
      els.synesthesiaMode
    ]) {
      input.addEventListener('input', markFormatPending);
      input.addEventListener('change', markFormatPending);
    }

    for (const input of [els.fontSize, els.bookWidth]) {
      input.addEventListener('input', scheduleCssOnlyApply);
      input.addEventListener('change', scheduleCssOnlyApply);
    }

    els.filePath.addEventListener('change', () => {
      els.filePath.value = toBookPath(els.filePath.value);
      renderBookList();
      saveSettings();
      loadBook();
    });

    els.smartScrollMode.addEventListener('change', saveSettings);

    loadSettings();
    applyLanguage();
    loadBook();
  </script>
</body>
</html>
